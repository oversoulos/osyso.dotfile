# =====================================================================
# --- MASTER SYSTEM ENVIRONMENT & MODIFIERS ---
# =====================================================================
# Use the 'Super' key (Windows key) as your main shortcut modifier
$mainMod = SUPER


# =====================================================================
# --- PER-WORKSPACE AESTHETIC PIPELINE ---
# =====================================================================

# WORKSPACE 1: OVERSOUL (The Visual Command Center)
workspace = 1, gapsin:5, gapsout:10, border:true, decorate:true, default:true
windowrulev2 = opacity 1.0 0.9, workspace:1     # Soft transparency for background apps

# WORKSPACE 2: DEVOPS (The Minimal Sandbox)
# Stripped down, no extra decorations, larger spacing for clear focus
workspace = 2, gapsin:8, gapsout:16, border:true, decorate:false
windowrulev2 = opacity 1.0 1.0, workspace:2     # Full solid opacity for text reading

# WORKSPACE 3: EDITOR (The Inverted School & Media Vault)
# Zero gaps, zero borders, completely flat look
workspace = 3, gapsin:0, gapsout:0, border:false, decorate:false


# ====================================================================
# --- PHASE 4C: MASTER AESTHETICS (GAPS & ROUNDING) ---
# =====================================================================

general {
    gaps_in = 6                   # Gap between windows
    gaps_out = 12                 # Gap between windows and screen edges
    border_size = 2               # Outer window border width (pixels)
    
    # dark background with minimal hazy neon palette, iridescent borders, window frames, backlit, soft 
    col.active_border = rgba(33cceeee) rgba(ff79c6ee) 45deg
    col.inactive_border = rgba(595959aa)
}

decoration {
    rounding = 10                 # Smoothly rounds your window edges
    active_opacity = 1.0          # Opaque when working, transparent blur when out of focus
    inactive_opacity = 0.9        # Subtle dim on background apps
}  
 
animations {
    enabled = true
    bezier = snapCurve, 0.1, 0.9, 0.2, 1.0
    animation = windows, 1, 6, snapCurve
    animation = workspaces, 1, 5, default, slide
}

### bold nerd font that i can hotkey from standard size, about 26 for when im sitting further from my screen (applies to mouse muted flat periwinkle, pink, yellows to comfortably contrast darker background windows.. 


# =====================================================================
# --- GEOMETRY & WINDOW RULES ---
# =====================================================================

# 🟣 The AI Chatbox (Small black screen, neon purple border)
windowrulev2 = float, title:^(AI-Chatbox)$
windowrulev2 = size 400 600, title:^(AI-Chatbox)$
windowrulev2 = bordercolor rgba(8800ffeed) rgba(bf00ffeed) 45deg, title:^(AI-Chatbox)$

# 📐 Oversoul Quarter-Window Layouts (Casual Mode)
# Forces media to stay floating in a clean quadrant until you full-screen toggle it
windowrulev2 = float, class:^(spotify)$
windowrulev2 = size 25% 45%, class:^(spotify)$
windowrulev2 = move 2% 50%, class:^(spotify)$ # Anchors it to the bottom-left quarter

# Tabbed Stacking for Notes and Files
windowrulev2 = tile, class:^(obsidian)$
windowrulev2 = tile, class:^(nemo)$


# =====================================================================
# --- PHASE 4D: ACTIVITY KEYBINDS & QUICK-DRAW HOTKEYS ---
# =====================================================================

# Instant Terminal / File System Quick-Draw Hotkeys
bind = $mainMod, RETURN, exec, ghostty          # Hitting Enter draws a new command terminal
bind = $mainMod, E, exec, nemo                  # Hitting E draws your file tree manager
bind = $mainMod, SPACE, exec, rofi-wayland -show drun # Hitting Space draws your app drawer

# Pyprland Slide-In Side Panels
bind = $mainMod, GRAVE, exec, pyprctl toggle term    # Draw down the hidden terminal from the top
bind = $mainMod, D, exec, pyprctl toggle discord      # Draw down your social deck from the right side

# Basic Window Controls
bind = $mainMod, Q, killactive                  # Close focused program window
bind = $mainMod, F, fullscreen, 0               # Toggle full screen toggle
bind = $mainMod, V, togglefloating,             # Force a window to float over your canvas

# Workspace Switching Hotkeys
bind = $mainMod, 1, workspace, 1                # Move focus to oversoul(command center drop in dash board over casual space)
bind = $mainMod, 2, workspace, 2                # Move focus to devops(sandboxed visual development workstation)
bind = $mainMod, 3, workspace, 3                # Move focus to editor(digital mixed media editing, light weight sandbox)

# Move active windows to different workspaces (For drag and drop operations)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3


