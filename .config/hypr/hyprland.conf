# =====================================================================
# --- AUTOMATED WORKSPACE STARTUP PIPELINE (EXEC-ONCE) ---
# =====================================================================

# Workspace 1 (Oversoul): System metrics, your custom tmux dashboard, and cheat sheet
exec-once = [workspace 1 silent] ghostty -e tmux new-session -s oversoul-deck "cat /modules/securityhq/manual && zsh"
exec-once = [workspace 1 silent] brave

# Workspace 2 (Devops): Communication and social platforms running background idle loops
exec-once = [workspace 2 silent] discord --minimized

# Workspace 3 (Editor): Secondary media layout streaming engines
exec-once = [workspace 3 silent] spotify

# Initialize the backend slide-out panel daemon
exec-once = pyprland


# =====================================================================
# --- HOT-EDGE & PYPRLAND LAYOUT RULES ---
# =====================================================================

plugin {
    # Activates your custom hotkey drop-downs natively from the screen borders
    hot-edge {
        enabled = true
        
        # Right Side Trigger: Slides out your background Discord panel
        edge1 {
            side = right
            trigger_width = 10
            dwell_time = 120
            command = pyprctl toggle discord
        }
        
        # Top Side Trigger: Pulls down your core scratchpad drop-down terminal
        edge2 {
            side = top
            trigger_width = 10
            dwell_time = 120
            command = pyprctl toggle term
        }
    }
}
